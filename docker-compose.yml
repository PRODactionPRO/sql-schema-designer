services:
  postgres:
    image: postgres:16-alpine
    container_name: sql-schema-designer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sql_schema_designer
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sql_schema_designer']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
